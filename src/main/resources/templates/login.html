<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Restaurant Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2ecc71;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

</style>

</head>

<body>

<div class="login-box">

<h2 style="text-align:center">Restaurant Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

<script src="/js/script.js"></script>

</body>
</html>
